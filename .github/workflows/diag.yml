name: diag
on: workflow_dispatch
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: probe sources
        run: |
          set +e
          SC="https://ed-public-download.scorecard.network/downloads/Most-Recent-Cohorts-Institution_06102026.zip"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          echo "scorecard plain curl : $(curl -s -o /dev/null -w '%{http_code}' "$SC")"
          echo "scorecard browser UA : $(curl -s -o /dev/null -w '%{http_code}' -A "$UA" "$SC")"
          echo "nces ADM             : $(curl -s -o /dev/null -w '%{http_code}' https://nces.ed.gov/ipeds/datacenter/data/ADM2023.zip)"
          echo "opportunityinsights  : $(curl -s -o /dev/null -w '%{http_code}' https://opportunityinsights.org/wp-content/uploads/2018/03/mrc_table1.csv)"
          echo "clery fileList       : $(curl -s -o /dev/null -w '%{http_code}' https://ope.ed.gov/campussafety/api/dataFiles/fileList)"
          pip install curl_cffi -q
          echo "scorecard curl_cffi  : $(python -c "from curl_cffi import requests as r; print(r.get('$SC', impersonate='chrome', stream=True).status_code)")"
          echo "nces curl_cffi       : $(python -c "from curl_cffi import requests as r; print(r.get('https://nces.ed.gov/ipeds/datacenter/data/ADM2023.zip', impersonate='chrome', stream=True).status_code)")"
